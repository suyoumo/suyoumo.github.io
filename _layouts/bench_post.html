---
layout: bench
---

<section class="bench-section bench-detail-page bench-post-page">
  <div class="container-wide bench-shell bench-blog-shell bench-blog-shell-wide">
    <a href="{{ site.baseurl }}/bench/blog/" class="back-link bench-back-link">← Back to Bench Blog</a>

    <article class="bench-card bench-post-card bench-post-card-wide">
      <div class="post-header bench-post-header">
        <h1 class="post-title">{{ page.display_title | default: page.title }}</h1>
        <div class="post-meta">
          <span>{{ page.date | date: "%Y-%m-%d" }}</span>
          {% if page.categories.size > 0 %}
          <span class="post-card-category">{{ page.categories | first }}</span>
          {% endif %}
          <span>阅读 <span id="busuanzi_value_page_pv"></span> 次</span>
          <span>|</span>
          <span><span id="unique_visitor_count"></span> 人读过</span>
        </div>
      </div>

      <div class="post-content bench-post-content bench-post-content-wide">
        {{ content }}
      </div>

      <script>
        document.addEventListener('DOMContentLoaded', function () {
          const switcher = document.querySelector('.bench-lang-switch');
          if (!switcher) return;
          const buttons = Array.from(switcher.querySelectorAll('.bench-lang-btn'));
          const panels = Array.from(document.querySelectorAll('[data-lang-panel]'));

          function currentPageLanguage() {
            const params = new URLSearchParams(window.location.search);
            const urlLang = params.get('lang');
            if (urlLang === 'zh' || urlLang === 'en') return urlLang;
            if (window.ClawProBenchI18n && window.ClawProBenchI18n.language) {
              return window.ClawProBenchI18n.language();
            }
            return switcher.dataset.defaultLang || 'en';
          }

          function activate(lang) {
            const nextLang = lang === 'zh' ? 'zh' : 'en';
            buttons.forEach(btn => btn.classList.toggle('is-active', btn.dataset.lang === nextLang));
            panels.forEach(panel => panel.classList.toggle('is-active', panel.dataset.langPanel === nextLang));
            switcher.dataset.currentLang = nextLang;
          }

          buttons.forEach(btn => {
            btn.addEventListener('click', function () {
              activate(btn.dataset.lang);
              if (window.ClawProBenchI18n && window.ClawProBenchI18n.apply) {
                window.ClawProBenchI18n.apply(btn.dataset.lang);
              }
            });
          });

          document.addEventListener('clawprobench:languagechange', function (event) {
            activate(event.detail && event.detail.language);
          });

          activate(currentPageLanguage());
        });
      </script>

      {% include giscus.html %}
      {% include visitor-tracker.html %}
    </article>
  </div>
</section>
