<!DOCTYPE html>
<html lang="en">
  <head>
    <title>{% if page.title %}{{ page.title }} – {% endif %}ClawProBench</title>

    {% include meta.html %}

    <link rel="stylesheet" type="text/css" href="{{ site.baseurl }}/style.css?v={{ site.time | date: '%s' }}" />
    <script defer src="{{ site.baseurl }}/assets/js/bench-i18n.js?v={{ site.time | date: '%s' }}"></script>
    <script async src="//busuanzi.ibruce.info/busuanzi/2.3/busuanzi.pure.mini.js"></script>
  </head>

  <body class="bench-body">
    <header class="site-header bench-header">
      <div class="container-wide header-inner bench-header-inner">
        <a class="bench-brand" href="{{ site.baseurl }}/bench/">
          <span class="bench-brand-logo-wrap">
            <img class="bench-brand-logo bench-brand-logo-default" src="{{ site.baseurl }}/assets/images/bench/logo-crab.png" alt="ClawProBench logo" />
            <img class="bench-brand-logo bench-brand-logo-hover" src="{{ site.baseurl }}/assets/images/bench/logo-longxia.png" alt="ClawProBench hover logo" />
          </span>
          <span class="bench-brand-text">ClawProBench</span>
        </a>
        <nav class="site-nav bench-nav">
          <button class="bench-language-toggle" type="button" data-bench-language-toggle aria-label="切换到中文">中文</button>
          <a href="{{ site.baseurl }}/bench/" {% if page.url == '/bench/' or page.url == '/bench/index.html' %}class="active"{% endif %}>Home</a>
          <a href="{{ site.baseurl }}/code-agent-bench/" {% if page.url contains '/code-agent-bench' %}class="active"{% endif %}>CodeAgentBench</a>
          <a href="{{ site.baseurl }}/bench/tasks/" {% if page.url contains '/bench/tasks' %}class="active"{% endif %}>Tasks</a>
          <a href="{{ site.baseurl }}/bench/blog/" {% if page.url contains '/bench/blog' %}class="active"{% endif %}>Blog</a>
          <a href="{{ site.baseurl }}/about">AboutMe</a>
          <a href="https://github.com/suyoumo/ClawProBench" target="_blank" rel="noopener">GitHub</a>
        </nav>
      </div>
    </header>

    <main class="bench-main">
      {{ content }}
    </main>
  </body>
</html>
